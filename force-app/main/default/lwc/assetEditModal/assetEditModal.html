<template>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleClose}>
                    <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <h2 class="slds-text-heading_medium">Edit Asset</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium">
                <lightning-record-edit-form record-id={recordId} object-api-name={objectApiName}>
                    <lightning-messages></lightning-messages>
                    <div class="slds-grid slds-wrap slds-gutters_small">
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input-field field-name={fields.name}></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input-field field-name={fields.type}></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input-field field-name={fields.status}></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input-field field-name={fields.purchaseDate}></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input-field field-name={fields.cost}></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input-field field-name={fields.serialNumber}></lightning-input-field>
                        </div>
                    </div>
                </lightning-record-edit-form>
            </div>
            <footer class="slds-modal__footer">
                <lightning-button label="Cancel" onclick={handleClose}></lightning-button>
                <lightning-button class="slds-m-left_small" variant="brand" label="Save" onclick={handleSave} disabled={isSaving}></lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
