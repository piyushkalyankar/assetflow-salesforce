<template>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleClose}>
                    <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <h2 class="slds-text-heading_medium">View Asset</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium">
                <lightning-record-view-form record-id={recordId} object-api-name={objectApiName}>
                    <div class="slds-grid slds-wrap slds-gutters_small">
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-output-field field-name={nameField}></lightning-output-field>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-output-field field-name={typeField}></lightning-output-field>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-output-field field-name={statusField}></lightning-output-field>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-output-field field-name={purchaseDateField}></lightning-output-field>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-output-field field-name={costField}></lightning-output-field>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-output-field field-name={serialNumberField}></lightning-output-field>
                        </div>
                    </div>
                </lightning-record-view-form>
            </div>
            <footer class="slds-modal__footer">
                <lightning-button label="Close" onclick={handleClose}></lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
