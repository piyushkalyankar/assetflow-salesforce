<template>

    <lightning-card title="Admin Dashboard" icon-name="standard:asset_object">

        <div class="slds-p-around_medium">

            <lightning-layout multiple-rows>

                <lightning-layout-item size="12" medium-device-size="3" padding="around-small">

                    <lightning-card title="Total Assets">

                        <div class="slds-p-around_medium slds-text-align_center">

                            <h2 class="slds-text-heading_large">

                                {totalAssets}

                            </h2>

                        </div>

                    </lightning-card>

                </lightning-layout-item>

                <lightning-layout-item size="12" medium-device-size="3" padding="around-small">

                    <lightning-card title="Available">

                        <div class="slds-p-around_medium slds-text-align_center">

                            <h2 class="slds-text-heading_large">

                                {availableAssets}

                            </h2>

                        </div>

                    </lightning-card>

                </lightning-layout-item>

                <lightning-layout-item size="12" medium-device-size="3" padding="around-small">

                    <lightning-card title="Allocated">

                        <div class="slds-p-around_medium slds-text-align_center">

                            <h2 class="slds-text-heading_large">

                                {allocatedAssets}

                            </h2>

                        </div>

                    </lightning-card>

                </lightning-layout-item>

                <lightning-layout-item size="12" medium-device-size="3" padding="around-small">

                    <lightning-card title="Maintenance">

                        <div class="slds-p-around_medium slds-text-align_center">

                            <h2 class="slds-text-heading_large">

                                {maintenanceAssets}

                            </h2>

                        </div>

                    </lightning-card>

                </lightning-layout-item>

            </lightning-layout>

            <div class="slds-grid slds-grid_align-spread slds-m-top_large slds-m-bottom_medium">

                <lightning-input
                    type="search"
                    label="Search Assets"
                    value={searchKey}
                    onchange={handleSearch}>
                </lightning-input>

                <div class="slds-m-top_large">

                    <lightning-button
                        label="New Asset"
                        variant="brand"
                        icon-name="utility:add"
                        onclick={handleNewAsset}>
                    </lightning-button>

                </div>

            </div>

            <lightning-datatable

                key-field="Id"

                data={assets}

                columns={columns}
                sorted-by={sortedBy}
                sorted-direction={sortedDirection}
                onsort={handleSort}
                onrowaction={handleRowAction}>

            </lightning-datatable>

        </div>

    </lightning-card>

   <c-asset-modal lwc:if={showAssetModal} onclosemodal={handleCloseModal}></c-asset-modal>

   <template if:true={showViewModal}>
       <c-asset-view-modal record-id={selectedRecordId} onmodalclose={handleCloseModal}></c-asset-view-modal>
   </template>

   <template if:true={showEditModal}>
       <c-asset-edit-modal record-id={selectedRecordId} onmodalclose={handleCloseModal} onsaved={handleAssetSaved}></c-asset-edit-modal>
   </template>

   <template if:true={showDeleteConfirm}>
       <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
           <div class="slds-modal__container">
               <header class="slds-modal__header">
                   <h2 class="slds-text-heading_medium">Confirm Delete</h2>
               </header>
               <div class="slds-modal__content slds-p-around_medium">
                   <p>Are you sure you want to delete this asset?</p>
               </div>
               <footer class="slds-modal__footer">
                   <lightning-button label="Cancel" onclick={handleCloseModal}></lightning-button>
                   <lightning-button class="slds-m-left_small" variant="destructive" label="Delete" onclick={confirmDelete}></lightning-button>
               </footer>
           </div>
       </section>
       <div class="slds-backdrop slds-backdrop_open"></div>
   </template>

</template>
